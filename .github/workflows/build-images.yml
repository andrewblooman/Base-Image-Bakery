name: Build and Publish Base Images

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfiles/**"
      - "certs/**"
      - ".github/workflows/build-images.yml"
      - ".github/scripts/analyse-scan-results.py"
  pull_request:
    branches:
      - main
    paths:
      - "Dockerfiles/**"
      - "certs/**"
      - ".github/workflows/build-images.yml"
  schedule:
    # Rebuild every Monday at 06:00 UTC to pick up upstream base-image updates
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # Required for Cosign keyless signing via GitHub OIDC

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. BUILD — compile each image locally and export as a tarball artifact
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: "Build: ${{ matrix.image.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: alpine
            dockerfile: Dockerfiles/alpine/Dockerfile
            repo: base-alpine
            version: "3.21"
          - name: dind
            dockerfile: Dockerfiles/docker-in-docker/Dockerfile
            repo: base-dind
            version: "27"
          - name: eclipse-temurin
            dockerfile: Dockerfiles/eclipse-temurin/Dockerfile
            repo: base-eclipse-temurin
            version: "21"
          - name: python
            dockerfile: Dockerfiles/python/Dockerfile
            repo: base-python
            version: "3.13"
          - name: golang
            dockerfile: Dockerfiles/golang/Dockerfile
            repo: base-golang
            version: "1.24"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image.repo }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ matrix.image.version }}
            type=sha,prefix=sha-
            type=schedule,pattern={{date 'YYYYMMDD'}}
          labels: |
            org.opencontainers.image.title=Base ${{ matrix.image.name }}
            org.opencontainers.image.vendor=Base Image Bakery
            org.opencontainers.image.version=${{ matrix.image.version }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: false
          load: true
          tags: bakery/${{ matrix.image.name }}:scan-target
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ matrix.image.version }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

      - name: Export image to tarball
        run: docker save bakery/${{ matrix.image.name }}:scan-target -o /tmp/image-${{ matrix.image.name }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v6
        with:
          name: image-${{ matrix.image.name }}
          path: /tmp/image-${{ matrix.image.name }}.tar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. SCAN — vulnerability scan with Grype (runs in parallel with sbom)
  # ─────────────────────────────────────────────────────────────────────────────
  scan:
    name: "Scan: ${{ matrix.image.name }}"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write  # required to upload SARIF to GitHub Security tab
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: alpine
          - name: dind
          - name: eclipse-temurin
          - name: python
          - name: golang

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: image-${{ matrix.image.name }}
          path: /tmp/

      - name: Load image
        run: docker load -i /tmp/image-${{ matrix.image.name }}.tar

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin
          grype version

      - name: Run Grype vulnerability scan
        run: |
          grype "bakery/${{ matrix.image.name }}:scan-target" \
            --output json \
            --file "grype-results-${{ matrix.image.name }}.json"
          grype "bakery/${{ matrix.image.name }}:scan-target" \
            --output sarif \
            --file "grype-results-${{ matrix.image.name }}.sarif"

      - name: Upload Grype scan results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: grype-results-${{ matrix.image.name }}
          path: grype-results-${{ matrix.image.name }}.json
          retention-days: 90

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: grype-results-${{ matrix.image.name }}.sarif
          category: grype-${{ matrix.image.name }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. SBOM — generate Software Bill of Materials with Syft (parallel with scan)
  # ─────────────────────────────────────────────────────────────────────────────
  sbom:
    name: "SBOM: ${{ matrix.image.name }}"
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: alpine
          - name: dind
          - name: eclipse-temurin
          - name: python
          - name: golang

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: image-${{ matrix.image.name }}
          path: /tmp/

      - name: Load image
        run: docker load -i /tmp/image-${{ matrix.image.name }}.tar

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          syft version

      - name: Generate SBOM (SPDX JSON)
        run: |
          syft "bakery/${{ matrix.image.name }}:scan-target" \
            --output spdx-json \
            --file "sbom-${{ matrix.image.name }}.spdx.json"

      - name: Upload SBOM
        uses: actions/upload-artifact@v6
        with:
          name: sbom-${{ matrix.image.name }}
          path: sbom-${{ matrix.image.name }}.spdx.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. PUSH — build and push to Docker Hub (skipped on pull requests)
  # ─────────────────────────────────────────────────────────────────────────────
  push:
    name: "Push: ${{ matrix.image.name }}"
    runs-on: ubuntu-latest
    needs: [scan, sbom]
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: alpine
            dockerfile: Dockerfiles/alpine/Dockerfile
            repo: base-alpine
            version: "3.21"
          - name: dind
            dockerfile: Dockerfiles/docker-in-docker/Dockerfile
            repo: base-dind
            version: "27"
          - name: eclipse-temurin
            dockerfile: Dockerfiles/eclipse-temurin/Dockerfile
            repo: base-eclipse-temurin
            version: "21"
          - name: python
            dockerfile: Dockerfiles/python/Dockerfile
            repo: base-python
            version: "3.13"
          - name: golang
            dockerfile: Dockerfiles/golang/Dockerfile
            repo: base-golang
            version: "1.24"

    outputs:
      # Unused directly — digest is passed via artifact to support matrix fan-out
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image.repo }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ matrix.image.version }}
            type=sha,prefix=sha-
            type=schedule,pattern={{date 'YYYYMMDD'}}
          labels: |
            org.opencontainers.image.title=Base ${{ matrix.image.name }}
            org.opencontainers.image.vendor=Base Image Bakery
            org.opencontainers.image.version=${{ matrix.image.version }}

      - name: Build and push image to Docker Hub
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ matrix.image.version }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

      - name: Save digest for cosign job
        run: echo "${{ steps.push.outputs.digest }}" > /tmp/digest-${{ matrix.image.name }}.txt

      - name: Upload digest artifact
        uses: actions/upload-artifact@v6
        with:
          name: digest-${{ matrix.image.name }}
          path: /tmp/digest-${{ matrix.image.name }}.txt
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. COSIGN — keyless sign and attest SBOM + provenance (skipped on PRs)
  # ─────────────────────────────────────────────────────────────────────────────
  cosign:
    name: "Cosign: ${{ matrix.image.name }}"
    runs-on: ubuntu-latest
    needs: push
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: alpine
            repo: base-alpine
          - name: dind
            repo: base-dind
          - name: eclipse-temurin
            repo: base-eclipse-temurin
          - name: python
            repo: base-python
          - name: golang
            repo: base-golang

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digest artifact
        uses: actions/download-artifact@v7
        with:
          name: digest-${{ matrix.image.name }}
          path: /tmp/

      - name: Download SBOM artifact
        uses: actions/download-artifact@v7
        with:
          name: sbom-${{ matrix.image.name }}

      - name: Sign container image (keyless)
        run: |
          DIGEST=$(cat /tmp/digest-${{ matrix.image.name }}.txt)
          cosign sign --yes \
            "${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image.repo }}@${DIGEST}"

      - name: Attest SBOM with Cosign
        run: |
          DIGEST=$(cat /tmp/digest-${{ matrix.image.name }}.txt)
          cosign attest --yes \
            --predicate "sbom-${{ matrix.image.name }}.spdx.json" \
            --type spdxjson \
            "${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image.repo }}@${DIGEST}"

      - name: Attest build provenance
        run: |
          DIGEST=$(cat /tmp/digest-${{ matrix.image.name }}.txt)
          cat > provenance.json <<EOF
          {
            "builder": {
              "id": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            },
            "buildType": "https://github.com/Attestations/GitHubActionsWorkflow@v1",
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/${{ github.repository }}@${{ github.ref }}",
                "digest": {
                  "sha1": "${{ github.sha }}"
                },
                "entryPoint": ".github/workflows/build-images.yml"
              },
              "parameters": {},
              "environment": {
                "github_event_name": "${{ github.event_name }}",
                "github_ref": "${{ github.ref }}",
                "github_run_id": "${{ github.run_id }}"
              }
            },
            "metadata": {
              "buildInvocationID": "${{ github.run_id }}/${{ github.run_attempt }}",
              "completeness": {
                "parameters": false,
                "environment": false,
                "materials": false
              },
              "reproducible": false
            },
            "materials": [
              {
                "uri": "git+https://github.com/${{ github.repository }}",
                "digest": {
                  "sha1": "${{ github.sha }}"
                }
              }
            ]
          }
          EOF
          cosign attest --yes \
            --predicate provenance.json \
            --type slsaprovenance \
            "${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image.repo }}@${DIGEST}"

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. REVIEW — analyse all Grype results with Claude and post PR comment
  # ─────────────────────────────────────────────────────────────────────────────
  review:
    name: Review Vulnerability Scan Results with Claude
    runs-on: ubuntu-latest
    needs: scan
    # Run even when some matrix scan jobs fail so we always get a security summary
    if: always()
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download all Grype scan results
        uses: actions/download-artifact@v7
        with:
          pattern: grype-results-*
          merge-multiple: true
          path: scan-results/

      - name: Analyse scan results with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          python3 .github/scripts/analyse-scan-results.py scan-results/ \
            | tee -a "$GITHUB_STEP_SUMMARY" > /tmp/claude-summary.md

      - name: Generate GitHub App token
        id: app-token
        if: github.event_name == 'pull_request'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Post security summary as PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file /tmp/claude-summary.md
