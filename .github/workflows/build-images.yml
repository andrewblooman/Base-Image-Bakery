name: Build and Publish Base Images

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfiles/**"
      - "certs/**"
      - ".github/workflows/build-images.yml"
      - ".github/scripts/analyse-scan-results.py"
  pull_request:
    branches:
      - main
    paths:
      - "Dockerfiles/**"
      - "certs/**"
      - ".github/workflows/build-images.yml"
  schedule:
    # Rebuild every Monday at 06:00 UTC to pick up upstream base-image updates
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # Required for Cosign keyless signing via GitHub OIDC

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build, scan, sign and push each image in parallel
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: "${{ matrix.image.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: alpine
            dockerfile: Dockerfiles/alpine/Dockerfile
            repo: base-alpine
            version: "3.21"
          - name: dind
            dockerfile: Dockerfiles/docker-in-docker/Dockerfile
            repo: base-dind
            version: "27"
          - name: eclipse-temurin
            dockerfile: Dockerfiles/eclipse-temurin/Dockerfile
            repo: base-eclipse-temurin
            version: "21"
          - name: python
            dockerfile: Dockerfiles/python/Dockerfile
            repo: base-python
            version: "3.13"
          - name: golang
            dockerfile: Dockerfiles/golang/Dockerfile
            repo: base-golang
            version: "1.24"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Generate OCI-standard tags and labels ──────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image.repo }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ matrix.image.version }}
            type=sha,prefix=sha-
            type=schedule,pattern={{date 'YYYYMMDD'}}
          labels: |
            org.opencontainers.image.title=Base ${{ matrix.image.name }}
            org.opencontainers.image.vendor=Base Image Bakery
            org.opencontainers.image.version=${{ matrix.image.version }}

      # ── Build locally for scanning (not pushed yet) ────────────────────────
      - name: Build image (local, for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: false
          load: true
          tags: bakery/${{ matrix.image.name }}:scan-target
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ matrix.image.version }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Vulnerability scan with Grype ──────────────────────────────────────
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin
          grype version

      - name: Run Grype vulnerability scan
        run: |
          grype "bakery/${{ matrix.image.name }}:scan-target" \
            --output json \
            --file "grype-results-${{ matrix.image.name }}.json"
          echo "Scan complete for ${{ matrix.image.name }}"

      - name: Upload Grype scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grype-results-${{ matrix.image.name }}
          path: grype-results-${{ matrix.image.name }}.json
          retention-days: 90

      # ── SBOM generation with Syft ──────────────────────────────────────────
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          syft version

      - name: Generate SBOM (SPDX JSON)
        run: |
          syft "bakery/${{ matrix.image.name }}:scan-target" \
            --output spdx-json \
            --file "sbom-${{ matrix.image.name }}.spdx.json"
          echo "SBOM generated for ${{ matrix.image.name }}"

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image.name }}
          path: sbom-${{ matrix.image.name }}.spdx.json
          retention-days: 90

      # ── Push to Docker Hub ─────────────────────────────────────────────────
      - name: Build and push image to Docker Hub
        id: push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ matrix.image.version }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Keyless signing with Cosign (Sigstore / Fulcio / Rekor) ───────────
      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign container image with Cosign (keyless)
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            "${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image.repo }}@${{ steps.push.outputs.digest }}"

      # ── Attest SBOM and build provenance (Sigstore / Rekor) ───────────────
      - name: Attest SBOM with Cosign
        if: github.event_name != 'pull_request'
        run: |
          cosign attest --yes \
            --predicate "sbom-${{ matrix.image.name }}.spdx.json" \
            --type spdxjson \
            "${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image.repo }}@${{ steps.push.outputs.digest }}"

      - name: Generate and attest build provenance
        if: github.event_name != 'pull_request'
        run: |
          cat > provenance.json <<EOF
          {
            "builder": {
              "id": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            },
            "buildType": "https://github.com/Attestations/GitHubActionsWorkflow@v1",
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/${{ github.repository }}@${{ github.ref }}",
                "digest": {
                  "sha1": "${{ github.sha }}"
                },
                "entryPoint": ".github/workflows/build-images.yml"
              },
              "parameters": {},
              "environment": {
                "github_event_name": "${{ github.event_name }}",
                "github_ref": "${{ github.ref }}",
                "github_run_id": "${{ github.run_id }}"
              }
            },
            "metadata": {
              "buildInvocationID": "${{ github.run_id }}/${{ github.run_attempt }}",
              "completeness": {
                "parameters": false,
                "environment": false,
                "materials": false
              },
              "reproducible": false
            },
            "materials": [
              {
                "uri": "git+https://github.com/${{ github.repository }}",
                "digest": {
                  "sha1": "${{ github.sha }}"
                }
              }
            ]
          }
          EOF
          cosign attest --yes \
            --predicate provenance.json \
            --type slsaprovenance \
            "${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image.repo }}@${{ steps.push.outputs.digest }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Review all scan results with Claude after every build run
  # ─────────────────────────────────────────────────────────────────────────────
  review-scan-results:
    name: Review Vulnerability Scan Results with Claude
    runs-on: ubuntu-latest
    needs: build-and-push
    # Run even when some matrix jobs fail so we always get a security summary
    if: always()
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all Grype scan results
        uses: actions/download-artifact@v4
        with:
          pattern: grype-results-*
          merge-multiple: true
          path: scan-results/

      - name: Analyse scan results with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          python3 .github/scripts/analyse-scan-results.py scan-results/ \
            | tee -a "$GITHUB_STEP_SUMMARY" > /tmp/claude-summary.md

      - name: Generate GitHub App token
        id: app-token
        if: github.event_name == 'pull_request'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Post security summary as PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file /tmp/claude-summary.md
